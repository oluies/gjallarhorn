name: CI

on:
  # Fire on every push to any branch (feature branches need CI feedback
  # before PR review; the cross-repo work with Neverlur means
  # boundary-crossing changes can't be verified locally on Apple Silicon
  # due to the pre-existing vuvuzela.io/crypto/bn256 assembly limitation,
  # so CI is the first verification surface).
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify modules
        run: go mod download

      - name: Check gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        continue-on-error: true
        run: go vet ./...

      - name: Test (unit)
        # Everything EXCEPT the integration-test directory. The unit
        # tests cover the convo / coordinator / mixnet packages and
        # the upcoming internal/testharness package once landed.
        #
        # Hard-failing as of #C3: the "cardinality violation" in
        # mixnet/TestRunRound* was a missing SendAndClose in the
        # client-streaming AddOnions server impl (mixnet/mixnet.go).
        # See that PR's commit message for the full diagnosis.
        run: |
          pkgs=$(go list ./... | grep -v '/e2e$')
          go test -race -count=1 -timeout 5m $pkgs

      - name: Test (e2e)
        # The Phase A integration test + the hybrid-carry-through
        # subtests + the no-classical-session-key static check.
        # `continue-on-error: true` while the e2e directory is still
        # empty (Phase A in flight); once the tests land this becomes
        # a hard gate per specs/001-conversation-wiring/contracts/ci-workflow.md.
        continue-on-error: true
        run: |
          if [ -d ./e2e ]; then
            go test -race -count=1 -timeout 5m ./e2e/...
          else
            echo "no e2e/ directory yet; skipping"
          fi

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    # continue-on-error while the inherited code still has findings the
    # path-except rule must catch but may miss as the codebase evolves.
    # Flip to hard-fail once internal/testharness/ and e2e/ are the
    # only PQ-touched paths and the exclusion is known-stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
